<script>
  window._bootStart = Date.now();
  window._bootCheck = setInterval(function() {
    var s = document.getElementById('boot-status');
    if (!s) { clearInterval(window._bootCheck); return; }
    var elapsed = ((Date.now() - window._bootStart) / 1000).toFixed(1);
    var libs = [];
    libs.push('React: ' + (window.React ? '✓' : '✗'));
    libs.push('ReactDOM: ' + (window.ReactDOM ? '✓' : '✗'));
    libs.push('Supabase: ' + (window.supabase ? '✓' : '✗'));
    libs.push('Babel: ' + (window.Babel ? '✓' : '✗'));
    s.innerHTML = elapsed + 's · ' + libs.join(' · ');
    if (elapsed > 8) {
      clearInterval(window._bootCheck);
      s.innerHTML = '⚠️ Algo no carga. Estado: ' + libs.join(' · ') + '<br><br>Comprueba tu conexión o desactiva bloqueadores.';
      s.style.color = '#c00';
    }
  }, 200);
  window.addEventListener('error', function(e) {
    var s = document.getElementById('boot-status');
    if (s) {
      s.innerHTML = '⚠️ ' + (e.message || 'Error') + '<br>en ' + (e.filename || '?') + ':' + (e.lineno || '?');

const SUPABASE_BUCKET = 'ecumanager';

let _supabase = null;
function getSupabase() {
  if (_supabase) return _supabase;
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error('Supabase SDK no cargado todavía. Recarga la página.');
  }
  _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _supabase;
}

async function uploadDataUrl(path, dataUrl) {
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  const { error } = await getSupabase().storage.from(SUPABASE_BUCKET).upload(path, blob, { upsert: true, contentType: blob.type || 'image/jpeg' });
  if (error) throw error;
  const { data } = getSupabase().storage.from(SUPABASE_BUCKET).getPublicUrl(path);
  // Cache-buster: como upsert reemplaza el blob pero la URL pública es la misma,
  // añadimos un timestamp para forzar a los clientes a descargar la versión nueva.
  return data.publicUrl + '?t=' + Date.now();
}

async function cloudLoad(clubCode) {
  const { data, error } = await getSupabase()
    .from('club_data')
    .select('data, updated_at')
    .eq('club_code', clubCode)
    .maybeSingle();
  if (error) throw error;
  return data ? { data: data.data, updatedAt: data.updated_at } : null;
}

async function cloudSave(clubCode, payload) {
  const { error } = await getSupabase()
    .from('club_data')
    .upsert({ club_code: clubCode, data: payload, updated_at: new Date().toISOString() }, { onConflict: 'club_code' });
  if (error) throw error;
}

              <button onClick={() => setStep('rider')} className="w-full bg-white text-stone-900 rounded-2xl p-5 text-left">
                <div className="flex items-center gap-3 mb-1">
                  <div className="text-3xl">🎒</div>
                  <div className="text-lg font-black uppercase tracking-wider">Soy jinete</div>
                </div>
                <div className="text-xs text-stone-600 font-bold">Veo mis paseos, insignias y los caballos del club</div>
              </button>

              <button onClick={() => setStep('club')} className="w-full bg-yellow-300 text-stone-900 rounded-2xl p-5 text-left">
                <div className="flex items-center gap-3 mb-1">
                  <div className="text-3xl">🏛️</div>
                  <div className="text-lg font-black uppercase tracking-wider">Soy del club</div>
                </div>
                <div className="text-xs text-stone-800 font-bold">Gestiono caballos, jinetes, insignias y configuración</div>
              </button>
            </div>
          </div>
          <div className="pb-6 text-center text-[10px] text-stone-600 font-bold">Prototipo · Datos compartidos vía Supabase</div>
        </div>
      );
    }

    const isClub = step === 'club';
    return (
      <div className="min-h-screen w-full flex flex-col bg-gradient-to-br from-stone-900 via-stone-800 to-stone-900">
        <div className="px-5 pt-5">
          <button onClick={() => setStep('choose')} className="flex items-center gap-1 text-white text-sm font-black">
            <ChevronLeft size={20} /> Volver
          </button>
        </div>
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-white">
          <div className="text-6xl mb-4">{isClub ? '🏛️' : '🎒'}</div>
          <div className="text-2xl font-black mb-1">{isClub ? 'Entrar como club' : 'Entrar como jinete'}</div>
          <div className="text-sm text-stone-400 font-bold mb-8 text-center max-w-xs">
            {isClub ? 'Elige un código para tu club. Si ya existe, accederás a su contenido.' : 'Introduce el código del club al que perteneces y tu nombre.'}
          </div>

          <div className="w-full max-w-xs space-y-3">
            {!isClub && (
              <div>
                <div className="text-[10px] font-black text-yellow-300 uppercase tracking-widest mb-1.5">Tu nombre</div>
                <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="p.ej. Carlota Van der Berg"
                  className="w-full bg-stone-800 border-2 border-stone-700 rounded-xl p-4 text-base font-bold text-white placeholder-stone-500 focus:border-yellow-400 outline-none" />
              </div>
            )}
            <div>
              <div className="text-[10px] font-black text-yellow-300 uppercase tracking-widest mb-1.5">Código de club</div>
              <input type="text" value={code} onChange={(e) => setCode(e.target.value)} placeholder="p.ej. lafinca"
                onKeyDown={(e) => { if (e.key === 'Enter') (isClub ? enterAsClub : enterAsRider)(); }}
                autoFocus={isClub}
                className="w-full bg-stone-800 border-2 border-stone-700 rounded-xl p-4 text-base font-bold text-white placeholder-stone-500 focus:border-yellow-400 outline-none" />
              <div className="text-[10px] text-stone-500 mt-1.5">Letras, números y guiones.</div>
            </div>

            <button onClick={isClub ? enterAsClub : enterAsRider} className="w-full bg-yellow-300 text-stone-900 font-black py-4 rounded-xl uppercase tracking-widest text-sm">
              {isClub ? 'Entrar al club' : 'Entrar como jinete'}
            </button>
          </div>
        </div>
        <div className="pb-6"></div>
      </div>
    );
  };

  // === Indicador flotante de sincronización ===
  const SyncIndicator = () => {
    if (syncStatus === 'idle') return null;
    const styles = {
      loading: { bg: 'bg-stone-900', text: 'text-yellow-300', icon: <RefreshCw size={14} className="spin" /> },
      syncing: { bg: 'bg-stone-900', text: 'text-yellow-300', icon: <Cloud size={14} className="spin" /> },
      ok: { bg: 'bg-green-600', text: 'text-white', icon: <Check size={14} /> },
      error: { bg: 'bg-red-600', text: 'text-white', icon: <X size={14} /> },
    };
    const s = styles[syncStatus] || styles.loading;
    return (
      <div className={`fixed top-2 left-1/2 -translate-x-1/2 z-[60] ${s.bg} ${s.text} px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center gap-1.5 shadow-lg`}>
        {s.icon}
        <span>{syncMessage || syncStatus}</span>
      </div>
    );
  };

  // Si falta tipo de usuario o código de club, mostrar pantalla de entrada
  if (!userType || !clubCode) {
    return <ClubCodeScreen />;
  }

  const isClubUser = userType === 'club';
  const headerBg = isClubUser ? clubConfig.primaryColor : '#1c1917';
  const headerFg = isClubUser ? clubConfig.accentColor : '#FDE047';

  return (
    <div className="min-h-screen w-full bg-white font-sans">
      <SyncIndicator />
      <div className="text-center py-1.5 text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2" style={{ background: headerBg, color: headerFg }}>
        <span>{isClubUser ? '🏛️ Modo Club' : '🎒 Modo Jinete'} · {clubConfig.shortName || clubConfig.name || clubCode}</span>
        <span className="opacity-60">·</span>
        <button onClick={refreshFromCloud} className="flex items-center gap-1 hover:opacity-80" title="Recargar desde la nube">
          <RefreshCw size={11} className={syncStatus === 'loading' || syncStatus === 'syncing' ? 'spin' : ''} />
          <span>Refrescar</span>
        </button>
        <span className="opacity-60">·</span>
        <span className="opacity-80">#{clubCode}</span>
      </div>
      <div className="pb-24">{renderScreen()}</div>
      <div className="fixed bottom-0 left-0 right-0 z-40"><BottomNav /></div>
      {showLogger && <LoggerModal />}
    </div>
  );
}

// === Error Boundary ===
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ error, info }); console.error('App error:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding: 20, fontFamily: 'monospace', background: '#fee', color: '#900', minHeight: '100vh'}}>
          <h1 style={{fontSize: 20, fontWeight: 900, marginBottom: 12}}>⚠️ Error en la app</h1>
          <div style={{fontSize: 14, marginBottom: 12}}><b>Mensaje:</b> {String(this.state.error.message || this.state.error)}</div>
          <pre style={{fontSize: 11, background: '#fdd', padding: 10, borderRadius: 6, overflow: 'auto', whiteSpace: 'pre-wrap'}}>{this.state.error.stack || ''}</pre>
          {this.state.info && this.state.info.componentStack && (
            <pre style={{fontSize: 11, background: '#fdd', padding: 10, borderRadius: 6, marginTop: 10, overflow: 'auto', whiteSpace: 'pre-wrap'}}>{this.state.info.componentStack}</pre>
          )}
          <button onClick={() => { try { localStorage.clear(); } catch(e){}; location.reload(); }} style={{marginTop: 16, padding: '10px 16px', background: '#900', color: 'white', border: 'none', borderRadius: 6, fontWeight: 900, cursor: 'pointer'}}>
            Limpiar todo y recargar
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// === Espera a que el SDK de Supabase esté cargado antes de montar la app ===
function mountApp() {
  if (!window.supabase || !window.supabase.createClient) {
    if (!window._mountAttempts) window._mountAttempts = 0;
    window._mountAttempts++;
    if (window._mountAttempts > 100) {
      document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:#900"><h1>⚠️ No se pudo cargar el SDK de Supabase</h1><p>Comprueba tu conexión y recarga la página.</p></div>';
      return;
    }
    setTimeout(mountApp, 50);
    return;
  }
  try {
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary><Equmanager /></ErrorBoundary>
    );
  } catch (e) {
    document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:#900"><h1>⚠️ Error al iniciar</h1><pre>' + (e.message || e) + '</pre></div>';
  }
}
mountApp();
</script>
</body>
</html>
