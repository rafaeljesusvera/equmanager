            <div className="absolute top-3 right-3 bg-yellow-300 px-2 py-1 rounded-md"><div className="text-[10px] font-black text-stone-900 uppercase tracking-widest">⭐ Tu caballo</div></div>
            <div className="absolute bottom-4 left-5 right-5 text-white">
              <div className="text-4xl font-black drop-shadow-lg">{h.name}</div>
              <div className="text-sm font-bold opacity-90">{h.breed} · {h.height}</div>
            </div>
          </div>
          <div className="px-5 pt-4">
            <div className="grid grid-cols-3 gap-2 mb-4">
              <div className="bg-white border border-stone-200 rounded-2xl p-3 text-center"><div className="text-[9px] text-stone-500 font-black uppercase tracking-widest">Peso</div><div className="text-xl font-black text-stone-900 mt-1">{h.weight}kg</div></div>
              <div className="bg-white border border-stone-200 rounded-2xl p-3 text-center"><div className="text-[9px] text-stone-500 font-black uppercase tracking-widest">Condición</div><div className="text-xl font-black text-stone-900 mt-1">{h.condition}/9</div></div>
              <div className="bg-white border border-stone-200 rounded-2xl p-3 text-center"><div className="text-[9px] text-stone-500 font-black uppercase tracking-widest">Ánimo</div><div className="text-xl font-black text-stone-900 mt-1">{h.moodEmoji}</div></div>
            </div>
            <div className="flex gap-1 mb-5 overflow-x-auto -mx-5 px-5 pb-1">
              {tabs.map(t => (
                <button key={t.id} onClick={() => setHorseDetailTab(t.id)} className={`px-3.5 py-2 rounded-full text-xs font-black uppercase tracking-wider whitespace-nowrap flex-shrink-0 ${horseDetailTab === t.id ? 'bg-stone-900 text-yellow-300' : 'bg-stone-100 text-stone-600'}`}>{t.label}</button>
              ))}
            </div>
            {horseDetailTab === 'resumen' && (
              <>
                <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Próximos eventos</h2>
                <div className="space-y-2 mb-5">
                  {upcomingHealth.map(e => (
                    <div key={e.id} className={`rounded-2xl p-3 flex items-center gap-3 ${e.daysLeft <= 7 ? 'bg-yellow-50 border-2 border-yellow-200' : 'bg-white border border-stone-200'}`}>
                      <div className="text-2xl">{e.icon}</div>
                      <div className="flex-1">
                        <div className="font-black text-sm text-stone-900">{e.title}</div>
                        <div className="text-[10px] text-stone-500 font-bold uppercase tracking-wider">{e.date} · {e.who}</div>
                      </div>
                      <div className={`px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-widest ${e.daysLeft <= 7 ? 'bg-yellow-300 text-stone-900' : 'bg-stone-100 text-stone-600'}`}>{e.daysLeft}d</div>
                    </div>
                  ))}
                </div>
                <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Pasaporte oficial</h2>
                <div className="bg-stone-900 rounded-2xl p-4 mb-5 text-white">
                  <div className="grid grid-cols-2 gap-3">
                    <div><div className="text-[9px] font-black text-yellow-300 uppercase tracking-widest">DIE</div><div className="text-xs font-black mt-0.5">{h.die}</div></div>
                    <div><div className="text-[9px] font-black text-yellow-300 uppercase tracking-widest">Microchip</div><div className="text-xs font-black mt-0.5">{h.microchip}</div></div>
                    <div><div className="text-[9px] font-black text-yellow-300 uppercase tracking-widest">Nacimiento</div><div className="text-xs font-black mt-0.5">{h.birthDate}</div></div>
                    <div><div className="text-[9px] font-black text-yellow-300 uppercase tracking-widest">Sexo</div><div className="text-xs font-black mt-0.5">{h.sex}</div></div>
                  </div>
                </div>
                <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Hitos de {h.name}</h2>
                <div className="space-y-2">
                  {horseAchievements.map((a, i) => (
                    <div key={i} className="bg-white border border-stone-200 rounded-2xl p-3 flex items-center gap-3">
                      <div className="text-2xl">{a.icon}</div>
                      <div className="flex-1"><div className="font-black text-sm text-stone-900">{a.title}</div><div className="text-xs text-stone-500">{a.desc}</div></div>
                    </div>
                  ))}
                </div>
              </>
            )}
            {horseDetailTab === 'salud' && (
              <>
                <div className="bg-gradient-to-br from-green-400 to-emerald-500 rounded-2xl p-4 text-white mb-5">
                  <div className="text-[10px] font-black uppercase tracking-widest opacity-90">Estado de salud</div>
                  <div className="text-2xl font-black mt-1">Excelente</div>
                </div>
                <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Historial</h2>
                <div className="space-y-2">
                  {healthRecords.map(r => (
                    <div key={r.id} className="bg-white border border-stone-200 rounded-2xl p-3">
                      <div className="flex items-start gap-3">
                        <div className="text-2xl">{r.icon}</div>
                        <div className="flex-1">
                          <div className="flex items-start justify-between mb-1">
                            <div className="font-black text-sm text-stone-900">{r.title}</div>
                            <div className="text-xs font-black text-stone-700">{r.cost}€</div>
                          </div>
                          <div className="text-[10px] text-stone-500 font-bold uppercase tracking-wider mb-1">{r.date} · {r.vet}</div>
                          <div className="text-xs text-stone-600">{r.notes}</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
            {horseDetailTab === 'comida' && (
              <>
                <div className="bg-gradient-to-br from-yellow-300 to-amber-400 rounded-2xl p-4 mb-5">
                  <div className="text-[10px] font-black uppercase tracking-widest text-stone-900/70">Ración diaria</div>
                  <div className="text-2xl font-black mt-1 text-stone-900">~16 kg/día</div>
                </div>
                <div className="space-y-3">
                  {feedingPlan.map((m, i) => (
                    <div key={i} className="bg-white border border-stone-200 rounded-2xl p-4">
                      <div className="flex items-center gap-3 mb-3">
                        <div className="text-2xl">{m.emoji}</div>
                        <div><div className="font-black text-stone-900">{m.meal}</div><div className="text-[10px] text-stone-500 font-black uppercase tracking-wider">{m.time}</div></div>
                      </div>
                      <div className="space-y-1.5">
                        {m.items.map((item, j) => (
                          <div key={j} className="flex items-center justify-between text-sm">
                            <span className="text-stone-700 font-medium">· {item.name}</span>
                            <span className="font-black text-stone-900">{item.qty}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
            {horseDetailTab === 'actividad' && (
              <div className="space-y-2">
                {horseActivities.map(a => (
                  <div key={a.id} className="bg-white border border-stone-200 rounded-2xl p-3 flex items-center gap-3">
                    <div className="text-2xl">{a.icon}</div>
                    <div className="flex-1"><div className="font-black text-sm text-stone-900">{a.title}</div><div className="text-[10px] text-stone-500 font-bold uppercase tracking-wider">{a.date} · {a.who}</div></div>
                    <div className="text-[10px] font-black text-stone-700 bg-stone-100 px-2 py-1 rounded-md">{a.duration}</div>
                  </div>
                ))}
              </div>
            )}
            {horseDetailTab === 'gastos' && (
              <>
                <div className="bg-gradient-to-br from-stone-900 to-stone-700 rounded-2xl p-5 mb-5 text-white">
                  <div className="text-[10px] font-black text-yellow-300 uppercase tracking-widest">Este mes</div>
                  <div className="text-4xl font-black mt-1">{totalExpenses}<span className="text-xl">€</span></div>
                </div>
                <div className="bg-white border border-stone-200 rounded-2xl p-4 space-y-3">
                  {expenses.map((e, i) => {
                    const pct = (e.amount / totalExpenses) * 100;
                    return (
                      <div key={i}>
                        <div className="flex items-center justify-between mb-1.5">
                          <div className="flex items-center gap-2"><span>{e.icon}</span><span className="text-sm font-black text-stone-900">{e.category}</span></div>
                          <span className="text-sm font-black text-stone-900">{e.amount}€</span>
                        </div>
                        <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: `${pct}%`, background: e.color }} /></div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
      </>
    );
  };

  const NextClassScreen = () => (
    <>
      <Header title="Próxima clase" back={() => setScreen('home')} />
      <div className="px-5 pt-3 pb-8">
        <div className="bg-stone-900 rounded-3xl p-6 mb-5 text-white">
          <div className="text-[10px] font-black text-yellow-300 uppercase tracking-widest mb-2">{nextClass.date}</div>
          <div className="text-3xl font-black mb-1">{nextClass.fullDate}</div>
          <div className="flex items-center gap-2 text-stone-300 text-sm"><Clock size={16} /><span className="font-bold">{nextClass.time} · {nextClass.duration}</span></div>
        </div>
        <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest flex items-center gap-2"><Zap size={14} className="text-yellow-500" /> Objetivos</h2>
        <div className="bg-white border border-stone-200 rounded-2xl p-4 mb-6 space-y-3">
          {nextClass.objectives.map((obj, i) => (
            <div key={i} className="flex items-start gap-3">
              <div className="w-6 h-6 rounded-full bg-yellow-100 flex items-center justify-center flex-shrink-0 mt-0.5"><span className="text-xs font-black text-yellow-700">{i + 1}</span></div>
              <span className="text-sm text-stone-700 font-medium">{obj}</span>
            </div>
          ))}
        </div>
        <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Última valoración</h2>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-black text-stone-900 mb-1">{lastFeedback.coach}</div>
          <div className="text-[10px] text-stone-500 font-bold uppercase tracking-wider mb-3">{lastFeedback.date} · con {lastFeedback.horse}</div>
          <p className="text-sm text-stone-700 font-medium">{lastFeedback.notes}</p>
        </div>
      </div>
    </>
  );

  const ProfileScreen = () => (
    <>
      <Header title="Tu perfil" />
      <div className="px-5 pt-3 pb-8">
        <div className="bg-stone-900 rounded-3xl p-5 mb-5 text-white flex items-center gap-4">
          <div className="w-20 h-20 rounded-full bg-yellow-300 text-stone-900 flex items-center justify-center font-black text-2xl">{user.avatar}</div>
          <div>
            <div className="text-xl font-black">{user.name}</div>
            <div className="text-xs text-stone-400 font-bold mt-1">{user.school}</div>
            <div className="inline-flex mt-2 bg-yellow-300 text-stone-900 px-2 py-0.5 rounded-md text-[10px] font-black uppercase tracking-widest">{user.level}</div>
          </div>
        </div>
        <div className="bg-gradient-to-br from-yellow-300 to-yellow-400 rounded-3xl p-6 mb-5">
          <div className="text-[10px] font-black text-stone-900/70 uppercase tracking-widest mb-1">Tu identidad ecuestre</div>
          <div className="text-5xl font-black text-stone-900 leading-none mb-1">{stats.totalHours}h</div>
          <div className="grid grid-cols-3 gap-3 mt-5 pt-5 border-t border-stone-900/20">
            <div><div className="text-2xl font-black text-stone-900">{stats.totalRides}</div><div className="text-[10px] font-black text-stone-900/70 uppercase tracking-wider">monturas</div></div>
            <div><div className="text-2xl font-black text-stone-900">{stats.uniqueHorses}</div><div className="text-[10px] font-black text-stone-900/70 uppercase tracking-wider">caballos</div></div>
            <div><div className="text-2xl font-black text-stone-900">{stats.badgesUnlocked}</div><div className="text-[10px] font-black text-stone-900/70 uppercase tracking-wider">insignias</div></div>
          </div>
        </div>
        <h2 className="text-xs font-black text-stone-900 mb-3 uppercase tracking-widest">Tus habilidades</h2>
        <div className="bg-white border border-stone-200 rounded-2xl p-4 space-y-4">
          {skills.map(skill => (
            <div key={skill.name}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-sm font-black text-stone-900">{skill.name}</span>
                <span className="text-sm font-black text-stone-900">{skill.value}</span>
              </div>
              <div className="h-2 bg-stone-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: `${skill.value}%`, background: skill.color }} /></div>
            </div>
          ))}
        </div>
      </div>
    </>
  );

  const LoggerModal = () => (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-end" onClick={() => setShowLogger(false)}>
      <div className="bg-white w-full rounded-t-3xl max-h-[88%] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="px-5 pt-4 pb-3 flex items-center justify-between border-b border-stone-100">
          <div>
            <div className="text-[10px] font-black text-yellow-600 uppercase tracking-widest">Paso {loggerStep} de 3</div>
            <div className="text-xl font-black text-stone-900">{loggerStep === 1 && '¿Qué caballo?'}{loggerStep === 2 && '¿Cómo te sentiste?'}{loggerStep === 3 && 'Cuéntalo'}</div>
          </div>
          <button onClick={() => setShowLogger(false)} className="p-2 rounded-full"><X size={20} className="text-stone-700" /></button>
        </div>
        <div className="px-5 py-5 pb-8">
          {loggerStep === 1 && (
            <div className="grid grid-cols-2 gap-3">
              {horses.map(h => (
                <button key={h.name} onClick={() => { setLogData({ ...logData, horse: h.name }); setLoggerStep(2); }} className="bg-white border-2 border-stone-200 rounded-2xl p-3 text-left">
                  <div className="w-full aspect-square rounded-xl mb-2 overflow-hidden"><HorseImg name={h.name} className="w-full h-full object-cover" /></div>
                  <div className="font-black text-sm text-stone-900">{h.name}</div>
                </button>
              ))}
            </div>
          )}
          {loggerStep === 2 && (
            <>
              <div className="grid grid-cols-2 gap-3 mb-6">
                {feelings.map(f => (
                  <button key={f.name} onClick={() => setLogData({ ...logData, feeling: f.name })} className={`border-2 rounded-2xl p-4 text-left ${logData.feeling === f.name ? 'border-yellow-400 bg-yellow-50' : 'border-stone-200'}`}>
                    <div className="text-3xl mb-2">{f.emoji}</div>
                    <div className="font-black text-sm" style={{ color: f.color }}>{f.name}</div>
                  </button>
                ))}
              </div>
              <button disabled={!logData.feeling} onClick={() => setLoggerStep(3)} className="w-full bg-stone-900 text-white font-black rounded-2xl p-4 disabled:bg-stone-200">Siguiente</button>
            </>
          )}
          {loggerStep === 3 && (
            <>
              <textarea placeholder="¿Cómo fue la sesión?" className="w-full border-2 border-stone-200 rounded-2xl p-4 text-sm resize-none mb-4" rows={5} />
              <button onClick={() => { setShowLogger(false); setLoggerStep(1); }} className="w-full bg-yellow-300 text-stone-900 font-black rounded-2xl p-4 flex items-center justify-center gap-2"><Check size={20} /> Guardar montura</button>
            </>
          )}
        </div>
      </div>
    </div>
  );

  const renderScreen = () => {
    if (screen === 'home') return <HomeScreen />;
    if (screen === 'badges') return <BadgesScreen />;
    if (screen === 'badge') return <BadgeDetailScreen />;
    if (screen === 'horses') return <HorsesScreen />;
    if (screen === 'horse') return <HorseDetailScreen />;
    if (screen === 'myhorse') return <MyHorseScreen />;
    if (screen === 'next') return <NextClassScreen />;
    if (screen === 'profile') return <ProfileScreen />;
    return <HomeScreen />;
  };

  return (
    <div className="min-h-screen w-full bg-white font-sans">
      <div className="pb-24">{renderScreen()}</div>
      <div className="fixed bottom-0 left-0 right-0 z-40"><BottomNav /></div>
      {showLogger && <LoggerModal />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Ecumanager />);
</script>
</body>
</html>
